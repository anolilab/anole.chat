name = "ai-chat"
compatibility_date = "2024-01-01"

# R2 bucket configuration for file storage
[[r2_buckets]]
binding = "FILES_BUCKET"
bucket_name = "ai-chat-files"
preview_bucket_name = "ai-chat-files-preview"

# Environment variables for development
[env.development]
vars = { ENVIRONMENT = "development" }

[env.production]
vars = { ENVIRONMENT = "production" }
